name: One-shot Thread-End Active Route Cutover

on:
  pull_request:
    types: [opened]
    paths:
      - ".thread-end-active-route-cutover-trigger"

permissions:
  contents: write

jobs:
  cutover:
    if: github.head_ref == 'thread-end-active-route-cutover'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Patch exact active routes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, text):
              Path(path).write_text(text, encoding='utf-8')

          def replace_exact(text, old, new, label, expected=1):
              count = text.count(old)
              if count != expected:
                  raise SystemExit(f'{label}: expected {expected}, found {count}')
              return text.replace(old, new)

          # 1. Root README router.
          p = 'README.md'
          t = read(p)
          t = replace_exact(
              t,
              '| [`_thread-end/README.md`](_thread-end/README.md) | Thread-End front door / Full and Mini Rail router | Threadを閉じる・移行する時 |',
              '| [`thread-end/README.md`](thread-end/README.md) | Canonical AI Thread-End front door / 3+1 migration router | Threadを閉じる・移行する時 |',
              'README router',
          )
          write(p, t)

          # 2. ARK current file ecology.
          p = 'ARK.md'
          t = read(p)
          t = replace_exact(
              t,
              '_thread-end/\n= Harvest / Handoff / Continuity Gate',
              'thread-end/\n= AI Thread-End / Handoff / Reboot / Continuity Gate',
              'ARK file ecology',
          )
          write(p, t)

          # 3. Thread-Start pair and end route.
          p = '_thread-start/thread-start_query.md'
          t = read(p)
          t = replace_exact(
              t,
              'paired_with: "_thread-end/thread-end_query.md"',
              'paired_with: "thread-end/ai-thread-end_query.md"',
              'Thread-Start paired_with',
          )
          t = replace_exact(
              t,
              '  - "thread-end_query.md closes the current Thread into Harvest and Handoff."',
              '  - "ai-thread-end_query.md activates the AI Thread-End 3+1 migration gate."',
              'Thread-Start core formula',
          )
          old_block = '''  thread_end:
    path: "_thread-end/thread-end_query.md"
    role: "Thread End Gate / Wheat-Grain Handoff"
    receives:
      - "Current Thread"
    produces:
      - "Harvest Download Artifact"
      - "Handoff Download Artifact"
      - "Stop"'''
          new_block = '''  thread_end:
    front_door: "thread-end/README.md"
    query: "thread-end/ai-thread-end_query.md"
    runtime: "thread-end/ai-thread-end.md"
    role: "AI Thread-End / 3+1 Migration Gate"
    receives:
      - "Current Thread Reality"
    produces:
      - "Human-readable Handoff"
      - "AI-native Thread Reboot Map"
      - "AI-first Start Query"
      - "Inline Copy & Paste Launch Surface"
      - "Stop"'''
          t = replace_exact(t, old_block, new_block, 'Thread-Start topology block')
          write(p, t)

          # 4. Ark System Gate Index.
          p = '_system/ark-system.md'
          t = read(p)
          old_block = '''  thread_end:
    path: "_thread-end/thread-end_query.md"
    role: "Thread End Runtime / Harvest and Handoff Gate"'''
          new_block = '''  thread_end:
    front_door: "thread-end/README.md"
    query: "thread-end/ai-thread-end_query.md"
    runtime: "thread-end/ai-thread-end.md"
    role: "AI Thread-End / Multi-Representation Migration Gate"'''
          t = replace_exact(t, old_block, new_block, 'Ark System Gate Index')
          write(p, t)

          # 5. Protocol Registry: active 3 paths + legacy classification.
          p = '_projects/ark/indexes/ark-protocol-registry.md'
          t = read(p)
          t = replace_exact(t, '  _thread-end/\n', '  thread-end/\n', 'Registry Fruit path')

          active_pattern = re.compile(
              r'  - path: "_thread-end/README\.md".*?(?=  - path: "_thread-index/README\.md")',
              re.DOTALL,
          )
          active_replacement = '''  - path: "thread-end/README.md"
    document_identity: "thread_end_folder_front_door"
    canonical_name: "Thread-End README"
    class: "S"
    status: "active / folder_front_door / canonical_topology_map"
    role:
      - "Canonical AI Thread-End Layerの入口"
      - "1 Set / 2 Control FilesのRead Order"
      - "3 Persistent Markdown + 1 Inline LaunchのTopology Map"
    must_not_be:
      - "AI Thread-End runtime body"
      - "Thread-specific Handoff"
      - "Legacy _thread-end router"

  - path: "thread-end/ai-thread-end_query.md"
    document_identity: "ai_thread_end_activation_query"
    canonical_name: "AI Thread-End Query"
    class: "S-candidate"
    status: "active / human_sealed / activation_query"
    paired_runtime: "thread-end/ai-thread-end.md"
    role:
      - "Current Thread Binding"
      - "Source / Target Coordinate Binding"
      - "Authority and Output Profile Binding"
    must_not_be:
      - "Thread-End runtime body"
      - "Standing GitHub write authority"

  - path: "thread-end/ai-thread-end.md"
    document_identity: "ai_thread_end_runtime"
    canonical_name: "AI Thread-End"
    class: "S-candidate"
    status: "active / human_sealed / field_proven_candidate"
    paired_query: "thread-end/ai-thread-end_query.md"
    role:
      - "Single Thread-End Compiler"
      - "Human-readable Handoff generator"
      - "AI-native Reboot Map generator"
      - "AI-first Start Query generator"
      - "Inline Copy & Paste Launch closure"
    must_not_be:
      - "Legacy _thread-end runtime"
      - "Human authority replacement"
      - "Universal Best Practice without further field evidence"

'''
          t, count = active_pattern.subn(active_replacement, t, count=1)
          if count != 1:
              raise SystemExit(f'Registry active Thread-End family: expected 1, found {count}')

          retired_anchor = '''retired_deleted_layers:
  thread_end_query_layer:
    status: "deleted / query layer retired"'''
          retired_replacement = '''retired_deleted_layers:
  legacy_thread_end_system:
    status: "superseded / locally backed up / deleted by Human"
    replaced_by:
      - "thread-end/README.md"
      - "thread-end/ai-thread-end_query.md"
      - "thread-end/ai-thread-end.md"
    guard:
      - "Do not use _thread-end/ as Active Runtime or fallback."
      - "Historical references may remain as historical evidence."
      - "Local backup and deletion were Human-controlled."

  thread_end_query_layer:
    status: "deleted / query layer retired"'''
          t = replace_exact(t, retired_anchor, retired_replacement, 'Registry legacy block')

          identity_pattern = re.compile(
              r'  thread_end_folder_front_door:.*?(?=  thread_index_folder_front_door:)',
              re.DOTALL,
          )
          identity_replacement = '''  thread_end_folder_front_door:
    meaning: "Canonical AI Thread-End Layerの入口 / Read Order / Topology Map"
    example:
      - "thread-end/README.md"

  ai_thread_end_activation_query:
    meaning: "Current Threadの座標・Target・Authority・Output ProfileをBindingするActivation Query"
    example:
      - "thread-end/ai-thread-end_query.md"

  ai_thread_end_runtime:
    meaning: "一つのShared Stateから3 Persistent Markdown + 1 Inline Launchを生成するRuntime"
    example:
      - "thread-end/ai-thread-end.md"

'''
          t, count = identity_pattern.subn(identity_replacement, t, count=1)
          if count != 1:
              raise SystemExit(f'Registry Thread-End identity rules: expected 1, found {count}')
          write(p, t)

          # Assertions before commit.
          required = {
              'README.md': ['[`thread-end/README.md`](thread-end/README.md)'],
              'ARK.md': ['thread-end/\n= AI Thread-End / Handoff / Reboot / Continuity Gate'],
              '_thread-start/thread-start_query.md': [
                  'paired_with: "thread-end/ai-thread-end_query.md"',
                  'front_door: "thread-end/README.md"',
                  'query: "thread-end/ai-thread-end_query.md"',
                  'runtime: "thread-end/ai-thread-end.md"',
              ],
              '_system/ark-system.md': [
                  'front_door: "thread-end/README.md"',
                  'query: "thread-end/ai-thread-end_query.md"',
                  'runtime: "thread-end/ai-thread-end.md"',
              ],
              '_projects/ark/indexes/ark-protocol-registry.md': [
                  'path: "thread-end/README.md"',
                  'path: "thread-end/ai-thread-end_query.md"',
                  'path: "thread-end/ai-thread-end.md"',
                  'legacy_thread_end_system:',
                  'status: "superseded / locally backed up / deleted by Human"',
              ],
          }
          for path, needles in required.items():
              current = read(path)
              for needle in needles:
                  if needle not in current:
                      raise SystemExit(f'Assertion failed: {path}: {needle}')

          # Remove this one-shot workflow in the same cutover commit.
          Path('.github/workflows/one-shot-thread-end-active-route-cutover.yml').unlink()
          PY

      - name: Commit one atomic cutover
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "refactor: cut over active Thread-End routes"
          git push origin HEAD:main
